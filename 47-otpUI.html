<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

label {
    color: white;
    font-size: 20px;
    font-weight: bold;
    display: block;
    margin-bottom: 20px;
}

.inputs {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.input {
    width: 55px;
    height: 60px;
    font-size: 24px;
    text-align: center;
    border-radius: 12px;
    border: none;
    outline: none;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}



.input:hover {
    background: #f1f5ff;
}
</style>
</head>

    <body>
    <div class="container">
        <label for="text">Enter the OTP</label>
        <div id="otp" class="inputs">
            <input class="input" type="text" autofocus inputmode="numeric" maxlength="1" autocomplete="one time" />
            <input class="input" type="text" inputmode="numeric" maxlength="1" autocomplete="one time"/>
            <input class="input" type="text" inputmode="numeric" maxlength="1" autocomplete="one time" />
            <input class="input" type="text" inputmode="numeric" maxlength="1" autocomplete="one time"/>
        </div>
    </div>
<script>
const inputs = document.getElementById("otp");

inputs.addEventListener("input", function (e) {
    const target = e.target;
    const val = target.value;

    if (isNaN(val)) {
        target.value = "";
        return;
    }

    if (val != "") {
        const next = target.nextElementSibling;
        if (next) {
            next.focus();
        }
    }
});

inputs.addEventListener("keyup", function (e) {
    const target = e.target;
    const key = e.key.toLowerCase();

    if (key == "backspace" || key == "delete") {
        target.value = "";
        const prev = target.previousElementSibling;
        if (prev) {
            prev.focus();
        }
        return;
    }
});
</script>
</body>
</html>
