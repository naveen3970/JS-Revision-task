<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <div>
            <label for="password">Enter the time</label>
            <input type="number" id="time">
        </div>
        <button id="btn" onclick="timer()">get sec</button>
        <div id="result">

        </div>
        <script>
            
function timer(){
    let t=document.getElementById("time").value
let sec=setInterval(()=>{
    document.getElementById("result").innerHTML="countdown"+t
    t--
    if(t<=0){
clearInterval(sec)
    }
},1000)

 }
        </script>
</body>
</html>
