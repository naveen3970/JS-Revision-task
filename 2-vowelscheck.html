<!-- Vowel or Not -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vowel checker</title>
    <style>
  body {
    background-color: rgb(106, 124, 124);
  }

  #form {
    background-color: bisque;
    text-align: center;
    padding: 60px;
    max-width: 400px;
    margin: 40px auto;
    border-radius: 20px;
  
  }

  #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
    padding-top: 40px;
  }
  #valid {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 20px;
    background-color: rgb(11, 218, 131);
    width: 70%;
  }
  .formInput{
    padding-top: 20px;
    text-align: center;
  }
  label{
    font-size: x-large;
  }
  #letter{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 60%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }
</style>
</head>
<body>
    <form id="form">
      <h1>Vowel Checker</h1>
<div class="formInput">
    <label for="letter">
    Enter the letter:
</label>
</div>
<div  class="formInput">
    <input type="text" id="letter">
</div>
<div  class="formInput">
<button id="valid">check</button>
</div>

<div id="errorCheck"  class="formInput"></div>
<div id="result"  class="formInput"></div>
    </form>
</body>
<script>
    const input=document.getElementById("letter")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("valid")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the letter "
    isValid=false
    return isValid
}
else if(input.value.length>1){
    error.innerHTML="Enter only one letter "
    isValid=false
    return isValid
}
else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
   e.preventDefault()
    if(validation()){
        let letter=input.value.toLowerCase()
       if(letter==='a'||letter==='e'||letter==='i'||letter==='o'||letter==='u'){
 result.innerHTML=`Letter "${letter}" is vowel`
       }
        else{
        result.innerHTML=`Letter "${letter}" is not a vowel`
    }
    }
   
})
</script>
</html>
