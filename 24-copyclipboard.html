
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>copy to clipboard</title>
    <style>
    body {
    background-color: rgb(106, 124, 124);
  }

  .form {
    background-color: bisque;
    padding: 60px;
    max-width: 400px;
    margin: 100px auto;
    border-radius: 20px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
    padding-top: 40px;
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 20px;
    background-color: rgb(11, 218, 131);
    width: 60%;
  }
  .formInput{
    padding-top: 20px;
    text-align: center;
  }
  label{
    font-size: x-large;
  }
    #input{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }
</style>
 </head>
 <body>
     <form class="form">
        <h1>Copy To Clipboard</h1>
        <div class="formInput">
            <label for=""> Enter the sentence:</label>
        </div>
        <div class="formInput">
            <textarea name="words" id="input"></textarea>

        </div>
        <div id="errorCheck" class="formInput"></div>
       <div class="formInput">

           <button type="button" id="button">Copy</button>
       </div>
        <div id="result" class="formInput"></div>
    </form>
    <script>
            const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
        const button=document.getElementById("button")
    const result=document.getElementById("result")
        isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the sentence "
    isValid=false
    return isValid
}


else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",()=>{
    if(validation()){
        navigator.clipboard.writeText(input.value)
        result.innerHTML=input.value
    }
})
    </script>
 </body>
 </html>
