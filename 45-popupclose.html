<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.form {
    background: white;
    padding: 60px;
    max-width: 400px;
    margin: 100px auto;
    border-radius: 20px;
    text-align: center;
}

.button {
    padding: 12px 20px;
    font-weight: bold;
    border-radius: 10px;
    border: none;
    background: #5b86e5;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.button:hover {
    background: #3f6ad8;
}

#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    animation: fadeIn 0.3s ease;
}

</style>

</head>
<body>

<div class="form">
    <button type="button" onclick="openModal()" class="button">Open</button>
</div>
<div id="modal" onclick="outsideClick(event)">
    <div class="modal-content">
        <p>Hello User! 👋</p>
        <br>
        <button onclick="closeModal()" class="button">Close</button>
    </div>
</div>

<script>
function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
function outsideClick(e){
    if(e.target.id === "modal"){
        closeModal();
    }
}
</script>

</body>
</html>
