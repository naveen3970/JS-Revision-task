

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="list"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
 
<script>
let data = Array.from({length:50}, (_,i)=>"Item "+(i+1));
 
let page = 1;
let perPage = 10;
 
function show(){
    let start = (page-1)*perPage;
    let items = data.slice(start, start+perPage);
 
    document.getElementById("list").innerHTML = items.join("<br>");
}
 
function next(){ if(page<5){
    page++;
}
     show(); }
function prev(){ if(page>1) page--; show(); }
 
show();

</script>
</body>
</html>
