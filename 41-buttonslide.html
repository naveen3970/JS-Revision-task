<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button {
            font-weight: bold;
            border-radius: 7px;
            background-color: rgb(75, 130, 182);

        }

        .form {
            background-color: rgb(118, 160, 214);
            text-align: center;
            padding: 60px;
            max-width: 500px;
            margin: 9rem auto;
            border-radius: 15px;
            text-align: center;
            display: flex;
            justify-content: center;
        }
        .input{
            padding-top: 75px;
            gap: 20px;
        }
    </style>
</head>

<body>
    <div class="form">
        <div class="input">

            <button onclick="prev()" class="button">Prev</button>
        </div>
        <div>

            <img id="img">
        </div>
        <div class="input">

            <button onclick="next()" class="button">Next</button>
        </div>
    </div>

    <script>
        let images = [
            "https://picsum.photos/200?1",
            "https://picsum.photos/200?2",
            "https://picsum.photos/200?3"
        ];

        let i = 0;

        function show() {
            document.getElementById("img").src = images[i];
        }

        function next() {
            i = (i + 1) % images.length;
            show();
        }

        function prev() {
            i = (i - 1 + images.length) % images.length;
            show();
        }

        show();
    </script>
</body>

</html>
