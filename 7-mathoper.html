 <!-- Sum & Multiply Numbers -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sum & Multiply Numbers
</title>
</head>
<body>
     <body>
   <form action="">
        <div>
            <label for=""> Enter the Numbers:</label>
            <input type="text" id="input">
        </div>
        <div id="errorCheck"></div>
        <button type="button" id="add">Add</button>
         <button type="button" id="mul">Multiple</button>
        <div id="result"></div>
    </form>
    <script>
            const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const addButton=document.getElementById("add")
    const multiplyBtn=document.getElementById("mul")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the Number "
    isValid=false
    return isValid
}


else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
addButton.addEventListener("click",(e)=>{
    e.preventDefault()
    let val=input.value
    if(validation()){
        let numArray=val.split(",")
        const sum = numArray.reduce((acc, index) => Number(acc)+Number(index), 0); 
result.innerHTML="sum of the number : "+sum
    }

})
multiplyBtn.addEventListener("click",(e)=>{
    e.preventDefault()
    let val=input.value
    if(validation()){
        let numArray=val.split(",")
        const sum = numArray.reduce((acc, index) => Number(acc)*Number(index), 0); 
result.innerHTML="product of the number : "+sum
    }

})



</script>

    </script>
 </body>
</body>
</html>
