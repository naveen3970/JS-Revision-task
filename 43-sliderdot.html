<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}
    </style>
</head>
<body>
    
    <div class="img">
        <img src="https://picsum.photos/200?1" alt="">
    </div>
        <div class="img">
        <img src="https://picsum.photos/200?2" alt="">
    </div>
        <div class="img">
        <img src="https://picsum.photos/200?3" alt="">
    </div>
    
<div style="text-align:center">
  <span class="dot" onclick="slider(1)"></span>
  <span class="dot" onclick="slider(2)"></span>
  <span class="dot" onclick="slider(3)"></span>
</div>
    <script >
function slider(n) {
    let index=n
  let slides = document.getElementsByClassName("img");
  let dots = document.getElementsByClassName("dot");
  if (n > slides.length) {index = 1}    
  if (n < 1) {index = slides.length}
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[index-1].style.display = "block";  
  dots[index-1].className += " active";
}
</script>
</body>
</html>
