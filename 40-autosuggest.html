

 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body {
    background-color: rgb(73, 192, 192);
   
  }
    .form {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
  #output{
    font-weight: bold;
    font-size: larger;
    padding-top: 20px;
    color: #c74d1d;
  }
    label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 50%;
  }
    </style>
</head>
<body>
    <div class="form">
            <label for="text">Enter the text</label>
            <input type="text" id="textInput" autofocus oninput="processDebounce()">
        </div>
    <ul id="list"></ul>
    <script >

 function processDebounce(){

            const text=document.getElementById("textInput")
            const output=document.getElementById("output")
            let countries = ["India","Indonesia","USA","UK"];
            function debounce(fun,delay) {
             let time
            return function(...args){
                clearTimeout(time)
                time=setTimeout(()=>{
                    fun.apply(this,args)
                },delay)
            }
        }
        function fun(val){
            let result = countries.filter(c => c.toLowerCase().includes(val));
 
let list = document.getElementById("list");
list.innerHTML = "";
 
result.forEach(c=>{
    let li = document.createElement("li");
    li.innerText = c;
    list.appendChild(li);
});
        }
        let debounceElement=debounce(fun,500)
        debounceElement(text.value)
 

        }
</script>
</body>
</html>
