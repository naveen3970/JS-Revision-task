
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>replace character</title>
    <style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(159, 218, 148);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
   
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(75, 130, 182);
    width: 55%;
  }

  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }

</style>
 </head>
 <body>
   <form class="form">
    <h1>Remove Duplicate</h1>
        <div class="formInput"> 
            <label for=""> Enter the Array:</label>
        </div>
        <div class="formInput">
            <input type="text" id="input">

        </div>
                
        <div id="errorCheck" class="formInput"></div>
        <div class="formInput">

            <button type="button" id="button">Next</button>
        </div>
        <div id="result" class="formInput"></div>
    </form>
 </body>
 <script>
    let input=document.getElementById("input")
    let error=document.getElementById("errorCheck")
    let button=document.getElementById("button")
    let result=document.getElementById("result")
        isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the Number "
    isValid=false
    return isValid
}


else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
    e.preventDefault()
    if(validation()){
        let val=input.value
        let arr=val.split(",")
let array = arr.reduce(function (acc, curr) {
    if (!acc.includes(curr)) {
        acc.push(curr);
    }
    
    return acc;
}, []);

result.innerHTML=array
        

    }
})
 </script>
 </html>
