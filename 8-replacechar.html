<!-- 8.replace character -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>replace character</title>
 </head>
 <body>
   <form action="">
        <div>
            <label for=""> Enter the Array:</label>
            <input type="text" id="input">
        </div>
                <div>
            <label for=""> Enter the position:</label>
            <input type="text" id="position">
        </div>
                <div>
            <label for=""> Enter the character:</label>
            <input type="text" id="character">
        </div>
        <div id="errorCheck"></div>
        <button type="button" id="replace">Replace</button>
        <div id="result"></div>
    </form>
 </body>
 <script>
    let input=document.getElementById("input")
    let position=document.getElementById("position")
    let character=document.getElementById("character")
    let error=document.getElementById("errorCheck")
    let button=document.getElementById("replace")
    let result=document.getElementById("result")
        isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the Number "
    isValid=false
    return isValid
}


else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
    e.preventDefault()
    if(validation()){
        let val=input.value
        let arr=val.split(",")
        let pos=Number(position.value)
        let char=character.value
        arr.splice(pos,1,char)
result.innerHTML=arr

    }
})
 </script>
 </html>
