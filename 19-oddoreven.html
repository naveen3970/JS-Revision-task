<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(159, 218, 148);
    text-align: center;
    padding: 60px;
    max-width: 400px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
   
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(75, 130, 182);
    width: 55%;
  }

  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }

</style>
</head>
<body>
      <form class="form">
        <div class="formInput">
            <label for=""> Enter the Number:</label>
        </div>
        <div>
            <input type="text" id="input">

        </div>
        <div id="errorCheck" class="formInput"></div>
        <div class="formInput">

            <button type="button" id="button">Check</button>
        </div>
        <div id="result" class="formInput"></div>
    </form>
        <script>
            const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("button")
    const result=document.getElementById("result")
    isValid=true
function validation(){
 
    if(input.value==="" ){
    error.innerHTML="Enter the Number "
    isValid=false
    return isValid
}

else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",()=>{
    if(validation()){
        let num=input.value
        if(num%2===0){
        result.innerHTML=`the number ${num} is even`
        }
        else{
            result.innerHTML=`the number ${num} is odd`
        }
    }
})
</script>
</body>
</html>
