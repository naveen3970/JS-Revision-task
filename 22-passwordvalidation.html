<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(159, 218, 148);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }


  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
   input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 70%;
  }
  #passresult{
    font-weight: bold;
    font-size: large;
  }
  </style>
</head>
<body>
    <form class="form">
        <div class="formInput">
            <label for="password">Enter the password</label>
        </div>
        <div class="formInput">
            <input type="password" id="pass" onchange="validation()">

        </div>
        <div id="passresult" class="formInput"></div>
    </form>
    <script>
        document.getElementById("pass").addEventListener("input",
        function validation(){
            let password=document.getElementById("pass").value
            let regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/
            if(password.length<6){
                document.getElementById("passresult").innerHTML="weak"
            }
            else if(!regex.test(password)){
                document.getElementById("passresult").innerHTML="medium"
                
            }
            else{
                document.getElementById("passresult").innerHTML="strong"
            }
            
        })
    </script>
</body>
</html>
