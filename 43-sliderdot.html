<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Slider</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.img {
    display: none;
}

.img img {
    width: 250px;
    height: 250px;
    border-radius: 15px;
    object-fit: cover;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.dot {
    cursor: pointer;
    height: 14px;
    width: 14px;
    margin: 10px 5px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    transition: 0.3s;
}

.dot:hover {
    background-color: #717171;
}

.active {
    background-color: #ffffff;
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="img">
    <img src="https://picsum.photos/200?1">
</div>
<div class="img">
    <img src="https://picsum.photos/200?2">
</div>
<div class="img">
    <img src="https://picsum.photos/200?3">
</div>

<div>
  <span class="dot" onclick="slider(1)"></span>
  <span class="dot" onclick="slider(2)"></span>
  <span class="dot" onclick="slider(3)"></span>
</div>

<script>
let index = 1;
slider(index);

function slider(n) {
  let slides = document.getElementsByClassName("img");
  let dots = document.getElementsByClassName("dot");

  if (n > slides.length) index = 1;
  else if (n < 1) index = slides.length;
  else index = n;

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.remove("active");
  }

  slides[index - 1].style.display = "block";
  dots[index - 1].classList.add("active");
}
</script>

</body>
</html>
