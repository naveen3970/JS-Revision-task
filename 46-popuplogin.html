<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #modal {
            display: none;
            position: fixed;
            z-index: 1;
            padding-top: 100px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0, 0, 0);
            background-color: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>

    <button id="button" onclick="openModal()">Go to login page</button>
    <div id="modal">
        <form class="modal-content animate" action="">
            <div class="imgcontainer">
                <span onclick="document.getElementById('modal').style.display='none'" class="close"title="Close Modal">&times;</span>
            </div>

            <div class="container">
                <label><b>Email</b></label>
                <input type="email" id="Email">

                <label><b>Password</b></label>
                <input type="password" id="pass">

                <button type="button" id="btn" onclick="data()">Login</button>
                </div>
                <button type="button" onclick="document.getElementById('modal').style.display='none'"class="cancelbtn">Cancel</button>
                
            </div>
                <div id="result">
                    <div id="output">

                    </div>
        </form>
    </div>
    <script>
        function data() {
            const email = document.getElementById("Email")
            const password = document.getElementById("pass")
            const output = document.getElementById("result")
            document.getElementById("modal").style.display = "none";
            document.getElementById("button").style.display = "none"
            output.innerHTML = email.value + password.value
        }
        function openModal() {
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
        window.onclick = function (e) {
            let modal = document.getElementById("modal");

            if (e.target == modal) {
                modal.style.display = "none";
            }
        }
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                modal.style.display = "none";
            }
        })
    </script>
</body>

</html>
