<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Get Query parameters
</title>
<style>
          body {
    background-color: rgb(73, 192, 192);
   
  }
    .form {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
  #result{
    font-weight: bold;
    font-size: larger;
    padding-top: 20px;
    color: #c74d1d;
  }
  #result1{
    font-weight: bold;
    font-size: larger;
    padding-top: 20px;
    color: #c74d1d;
  }
      #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(69, 72, 73);
    width: 60%;
    color: white;
  }
    </style>
</head>
<body>
<form class="form">
    <h1>Parameters From URL</h1>
         <div>
            <button type="submit" id="button" onclick="geturl()">Get params</button>
        </div>
        <div id="result"></div>
        <div id="result1"></div>
</form>
</body>
<script>
    function geturl(){
        event.preventDefault()
        let url=new URL("http://www.mitrahsoft.com/?technology=coldfusion&people=veryNice")
        let tech='technology'
        let people='people'
       let result=url.searchParams.get(tech)
        if (result !== null) {
    document.getElementById("result").innerHTML= tech + ' is: ' + result
} else {
    document.getElementById("result").innerHTML=tech +' not found in the query string.'
}
  
       let res=url.searchParams.get(people)
        if (result !== null) {
    document.getElementById("result1").innerHTML= people + ' is: ' + res
} else {
    document.getElementById("result1").innerHTML=people +' not found in the query string.'
}  } 
</script>
</html>
