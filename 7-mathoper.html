 <!-- Sum & Multiply Numbers -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sum & Multiply Numbers
</title>
<style>
    body {
    background-color: rgb(223, 241, 241);
  }

  #form {
    background-color: rgb(90, 89, 88);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
    box-shadow: 20px;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
   
  }
    #add {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(55, 205, 243);
    width: 60%;
  }
    #mul {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(55, 205, 243);
    width: 60%;
  }
  .formInput{
    padding-top: 20px;
    text-align: center;
  }
  label{
    font-size: x-large;
  }
    #input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }
  .btn{
    padding-top: 10px;
            display: flex;
            justify-content: space-between;
  }
</style>
</head>
<body>
     <body>
   <form id="form">
    <h1>Sum And Multiply</h1>
        <div>
            <label for=""> Enter the Numbers:</label>
            <input type="text" id="input">
        </div>
        <div id="errorCheck" class="formInput"></div>
        <div class="btn">

            <button type="button" id="add">Add</button>
            <button type="button" id="mul">Multiple</button>
        </div>
        
        <div id="result" class="formInput"></div>
    </form>
    <script>
            const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const addButton=document.getElementById("add")
    const multiplyBtn=document.getElementById("mul")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the array of number "
    isValid=false
    return isValid
}


else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
addButton.addEventListener("click",(e)=>{
    e.preventDefault()
    let val=input.value
    if(validation()){
      let a=/^\d+(,\d+)*$/
      if(a.test(val)){
        let numArray=val.split(",")
        const sum = numArray.reduce((acc, index) => Number(acc)+Number(index), 0); 
result.innerHTML="sum of the number : "+sum
    }
  else{
    error.innerHTML="Enter only numbers"
    result.innerHTML=""
  }}

})
multiplyBtn.addEventListener("click",(e)=>{
    e.preventDefault()
    let val=input.value
    if(validation()){
            let a=/^\d+(,\d+)*$/
      if(a.test(val)){
        let numArray=val.split(",")
        const sum = numArray.reduce((acc, index) => Number(acc)*Number(index), 1); 
result.innerHTML="product of the number : "+sum
    }
    else{
    error.innerHTML="Enter only numbers"
        result.innerHTML=""

  }
  }
})



</script>

    </script>
 </body>
</body>
</html>
