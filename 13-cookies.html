    <form class="form">
        <h1>Cookies Counter</h1>
        <div class="formInput">
            <label for="input" id="label"> Enter the Input:</label>
        </div>
        <div class="formInput">
            <input type="text" id="input">

        </div>
        <div class="formInput">

            <button type="button" id="button">Submit</button>
        </div>
        <div id="result"></div>
    </form>
    <script>

        const button = document.getElementById("button");
        const result = document.getElementById("result")
        button.addEventListener("click", function (event) {

            let count = parseInt(getCookie("submitCount")) || 0;
            count++;
            setCookie("submitCount", count, 30);
            alert("Form submitted. count: " + count)
        });
        window.onload = function () {
            const current = getCookie("submitCount") || 0;
            
        };

        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            const expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }
        function getCookie(cname) {
            const name = cname + "=";
            const decodedCookie = decodeURIComponent(document.cookie);
            const ca = decodedCookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) === 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }


    </script>
