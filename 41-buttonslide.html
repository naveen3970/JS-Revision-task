<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
}

.form {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

#img {
    width: 220px;
    height: 220px;
    border-radius: 15px;
    object-fit: cover;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: 0.4s;
}

.button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.button:hover {
    background: #f1f5ff;
    transform: scale(1.1);
}

.button:active {
    transform: scale(0.95);
}
.input {
    display: flex;
    align-items: center;
}
</style>
</head>

<body>
    <div class="form">
        <div class="input">

            <button onclick="prev()" class="button"><</button>
        </div>
        <div>

            <img id="img">
        </div>
        <div class="input">

            <button onclick="next()" class="button">></button>
        </div>
    </div>

    <script>
        let images = [
            "https://picsum.photos/200?1",
            "https://picsum.photos/200?2",
            "https://picsum.photos/200?3"
        ];

        let i = 0;

        function show() {
            document.getElementById("img").src = images[i];
        }

        function next() {
            i = (i + 1) % images.length;
            show();
        }

        function prev() {
            i = (i - 1 + images.length) % images.length;
            show();
        }

        show();
    </script>
</body>

</html>
