
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String
</title>
<style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(159, 218, 148);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
   
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(75, 130, 182);
    width: 55%;
  }

  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }

</style>
</head>
<body>
    <body>
    <form class="form">
        <h1>Alphabet Count</h1>
        <div class="formInput">
            <label for=""> Enter the string:</label>
        </div>
        <div class="formInput">
            <input type="text" id="input">

        </div>
        <div id="errorCheck" class="formInput"></div>
        <div class="formInput">

            <button type="button" id="button">Check palindrome </button>
        </div>
        <div id="result" class="formInput"></div>
    </form>
    <script>
    const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("button")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the string "
    isValid=false
    return isValid
}
else if(input.value.includes(" ")){
    error.innerHTML="Enter only one string "
    isValid=false
    return isValid
}
else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
   e.preventDefault()
    if(validation()){
        let text=input.value.toLowerCase()

        let vowelcount=0
        let consonantcount=0
for (let i = 0; i < text.length; i++) {
 if(text.charAt(i)==='a'||text.charAt(i)==='e'||text.charAt(i)==='i'||text.charAt(i)==='o'||text.charAt(i)==='u'){
    vowelcount++
 }
 else{
    consonantcount++
 }
    
}
let br = document.createElement('br');
        result.appendChild(br);
        
result.innerHTML+=`vowels count: ${vowelcount}`
result.innerHTML+=` consonant count: ${consonantcount}`



    }
   
})
</script>
</body>
</body>
</html>
