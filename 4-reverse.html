<!-- 4. Reverse String -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String
</title>
<style>
    body {
    background-color: rgb(106, 124, 124);
  }

  #form {
    background-color: bisque;
    padding: 60px;
    max-width: 400px;
    margin: 40px auto;
    border-radius: 20px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
    padding-top: 40px;
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 20px;
    background-color: rgb(11, 218, 131);
    width: 60%;
  }
  .formInput{
    padding-top: 20px;
    text-align: center;
  }
  label{
    font-size: x-large;
  }
    #input{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }
</style>
</head>
<body>
    
    <form id="form">
      <h1>Reverse String</h1>
        <div class="formInput">
            <label for=""> Enter the string:</label>
           
        </div>
        <div class="formInput">
            <input type="text" id="input">
        </div>
        <div class="formInput">
            <button type="button" id="button">Check</button>
        </div>
        <div id="errorCheck" class="formInput"></div>
        <div id="result" class="formInput"></div>
    </form>
    <script>
    const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("button")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the string "
    isValid=false
    return isValid
}
else if(input.value.includes(" ")){
    error.innerHTML="Enter only one string "
    isValid=false
    return isValid
}
else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
   e.preventDefault()
    if(validation()){
        let text=input.value

        let string=""
for (let i = 0; i < text.length; i++) {
string=text.charAt(i)+ string
    
}
result.innerHTML="Reversed string:"+string;


    }
   
})
</script>
</body>
</body>
</html>
