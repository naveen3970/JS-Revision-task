<!-- checkbox controls -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkbox controls</title>
    <style>
        body {
            background-color: rgb(223, 241, 241);
        }

        #form {
            background-color: rgb(90, 89, 88);
            text-align: center;
            padding: 60px;
            max-width: 500px;
            margin: 9rem auto;
            border-radius: 15px;
            box-shadow: 20px;
        }

        .button {

            padding: 17px;
            font-weight: bold;
            font-size: large;
            border-radius: 15px;
            background-color: rgb(55, 205, 243);
            width: 100%;
        }

        .options_box {
            padding-top: 20px;
            text-align: center;
            
        }
        .formInput{
            padding-top: 20px;
            text-align: center;
            
        }

        label {
            font-size: x-large;
        }

        #input {
            padding: 17px;
            font-size: large;
            border-radius: 15px;
            width: 50%;
        }

        #result {
            font-weight: bold;
            font-size: large;
        }
        .input{
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        
    </style>
</head>

<body>
    <form id="form">
        <h1>Checkbox Controls</h1>
        <div class="options_box">
            <div class="formInput">
                <input type="checkbox" class="check">
                <label for="option">Option 1</label>
            </div>
            <div class="formInput">
                <input type="checkbox" class="check">
                <label for="option">Option 2</label>
            </div>
            <div class="formInput">
                <input type="checkbox" class="check">
                <label for="option">Option 3</label>
            </div>
            <div class="formInput">
                <input type="checkbox" class="check">
                <label for="option">Option 4</label>
            </div>
            <div class="formInput">
                <input type="checkbox" class="check">
                <label for="option">Option 5</label>
            </div>
        </div>
        <div class="input">

            <div >
                <button type="button" id="checked" class="button" onclick="check()">Check All</button>
            </div>
            <div >
                <button type="reset" id="unchecked" class="button">Uncheck All</button>
            </div>
            <div >
                <button type="button" id="toggle" class="button" onclick="t()">Toggle</button>
            </div>
        </div>
    </form>
</body>
<script>
    function check() {
        let checkboxes = document.querySelectorAll('.check');
        for (let i = 0; i < checkboxes.length; i++) {
            checkboxes[i].checked = true;
        }
    }

    function t() {

        const checkboxes = document.querySelectorAll('.check');
        checkboxes.forEach(checkbox => {
            checkbox.checked = !checkbox.checked;
        });
    }



</script>

</html>
