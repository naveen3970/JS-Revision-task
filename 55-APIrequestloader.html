<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    background-color: rgb(73, 192, 192);
   
  }
        button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(69, 72, 73);
    width: 60%;
    color: white;
  }
   .container {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
    </style>
</head>
<body>
    <div class="container">

        <button onclick="fetchData()">Fetch Data</button>
    </div>
 
<script>

function fetchData(retry=3){
    
fetch("https://jsonplaceholder.typicode.com/po")
.then(res=>{
    if(!res.ok) throw "Error";
    return res.json();
})
.then(data=>{
    console.log(data);
})
.catch(()=>{
    if(retry>0){
        console.log("Retrying...");
        setTimeout(()=>{
            fetchData(retry-1)
        },3000)
    }else{
        console.log("Failed after retries");
    }
});
 
}
</script>
</body>
</html>
