
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6f8;
}

#internet{
padding:20px 40px;
border-radius:10px;
font-size:20px;
font-weight:bold;
color:rgb(18, 17, 17);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}


</style>
</head>
<div id="internet">

</div>
<script>
let online = navigator.onLine;
if (online) {
    
    document.getElementById("internet").innerHTML = "Browser is online " 
} else {
    document.getElementById("internet").innerHTML = "Browser is offline "
    
}
</script>
</html>
