<!-- 5.Largest Number -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
 </head>
 <body>
   <form action="">
        <div>
            <label for=""> Enter the Numbers:</label>
            <input type="text" id="input">
        </div>
        <div id="errorCheck"></div>
        <button type="button" id="button">Check</button>
        <div id="result"></div>
    </form>
    <script>
            const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("button")
    const result=document.getElementById("result")
    isValid=true
function validation(){
 
    if(input.value==="" ){
    error.innerHTML="Enter the Number "
    isValid=false
    return isValid
}

else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
    e.preventDefault()
    if(validation()){
        let val=input.value
       
        let numArray=val.split("")
        const max = numArray.reduce((acc, index) => {
  return index > acc ? index : acc;
}, 0); 
result.innerHTML="Largest Number: "+max
    }
})
    </script>
 </body>
 </html>
