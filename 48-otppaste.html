<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    display: flex;
    justify-content: center;
    align-items: center;
}

#otp-container {
    display: flex;
    gap: 15px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

#otp-container input {
    width: 60px;
    height: 65px;
    font-size: 24px;
    text-align: center;
    border-radius: 12px;
    border: none;
    outline: none;
    background: white;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#otp-container input:focus {
    transform: scale(1.1);
    border: 2px solid #5b86e5;
    box-shadow: 0 0 10px rgba(91,134,229,0.6);
}

#otp-container input:hover {
    background: #f1f5ff;
}
</style>
</head>
<body>
    <div id="otp-container">
    <input type="text" id="digit-1" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
    <input type="text" id="digit-2" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
    <input type="text" id="digit-3" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
    <input type="text" id="digit-4" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
</div>

    <script>
        document.querySelector('#digit-1').addEventListener('paste', (e) => {
    e.preventDefault();
    const data = e.clipboardData.getData('text').trim().split('');
    const inputs = document.querySelectorAll('#otp-container input');
    data.forEach((char, i) => { if (inputs[i]) inputs[i].value = char; });
});

    </script>
</body>
</html>
