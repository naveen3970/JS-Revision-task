<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body {
    background-color: rgb(73, 192, 192);
   
  }
    .form {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
     #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(75, 130, 182);
    width: 55%;
  }

    label {
            font-size: x-large;
        }

        input {
            padding: 17px;
            font-size: large;
            border-radius: 15px;
            width: 50%;
        }
      
         .formInput {
            padding-top: 10px;
            text-align: center;

        }
        table{
         padding-top: 10px;
            text-align: center;
            display: flex;
            justify-content: center;   
        }
    </style>
</head>

<body>
  <form class="form">

      <div class="formInput">
          <label for="name">Enter the name:</label>
        </div>
        <div class="formInput">
            <input type="text" id="name">

        </div>
        <div class="formInput">
            <label for="age">Enter the age:</label>
        </div>
        <div class="formInput">
            
            <input type="text" id="age">
        </div>
        <div class="formInput">
            <button type="button" id="button">add</button>
        </div>
    </form>
      <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <script>
        const name = document.getElementById("name")
        const age = document.getElementById("age")
        const button = document.getElementById("button")
        button.addEventListener("click", () => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${name.value}</td>
                <td>${age.value}</td>`
            tableBody.appendChild(row);
        })


    </script>
</body>

</html>
