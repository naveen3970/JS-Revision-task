<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debounce</title>
    <style>
          body {
    background-color: rgb(73, 192, 192);
   
  }
    .form {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
  #output{
    font-weight: bold;
    font-size: larger;
    padding-top: 20px;
    color: #c74d1d;
  }
    label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 50%;
  }
    </style>
</head>
<body>
    <form class="form">
        <div>
            <label for="text">Enter the text</label>
            <input type="text" id="textInput" oninput="processDebounce()">
        </div>
        <div id="output"></div>
    </form>
    <script>

const output = document.getElementById("output");
const searchdata = (query) => {
    if (!query) {
        output.innerText = "";
        return;
    }

    fetch(`https://api.github.com/search/users?q=${query}`)
        .then(res => res.json())
        .then(data => {
            output.innerText = data.items
                .map(u => u.login)
                .join(", ");
        })
        .catch(err => console.log(err));
};
function debounce(fn, delay) {
    let timer;
    return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => {
            fn.apply(this, args);
        }, delay);
    };
}
const debouncedSearch = debounce(searchdata, 500);
function processDebounce() {
    const text = document.getElementById("textInput").value;
    debouncedSearch(text);
}
</script>
    
</body>
</html>
