<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
    background-color: rgb(106, 124, 124);
  }

  .form {
    background-color: bisque;
    padding: 60px;
    max-width: 400px;
    margin: 100px auto;
    border-radius: 20px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
    padding-top: 40px;
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 20px;
    background-color: rgb(11, 218, 131);
    width: 60%;
  }
  .formInput{
    padding-top: 20px;
    text-align: center;
  }
  label{
    font-size: x-large;
  }
    span,input{
    padding: 17px;
    font-size: large;
    border-radius: 20px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }
  span:hover{
    color: aqua;
    cursor: pointer;
  }
  
</style>
</head>
<body>
    <form class="form"> 
<h1>password visibility</h1>
        <div class="formInput">
            <label for="password">Enter the password:</label>
        </div >
        <div class="formInput">
            <input type="password" id="password"><span id="show/hide">show </span>

        </div>
        <div id="errorCheck" class="formInput"></div>
    </form>
    <script>
        const password=document.getElementById("password")
        const visibility=document.getElementById("show/hide")
        const error=document.getElementById("errorCheck")
                isValid=true
function validation(){
    if(password.value==="" ){
    error.innerHTML="Enter the valid password "
    isValid=false
    return isValid
}
else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
        visibility.addEventListener("click",()=>{
            if(validation()){
            if(password.type==='password'){
                password.type='text'
                visibility.textContent='hide'
            }
            else{
                password.type='password'
                visibility.textContent='show'
            }
        }
    })

    </script>
</body>
</html>
