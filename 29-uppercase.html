<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Uppercase</title>
</head>
<body>
      <div>
        <label for="input">Enter the value:</label>
        <input type="text" id="value" >
        <div id="result"></div>
    </div>
    <script>
        const text=document.getElementById("value")
        const result=document.getElementById("result")
       text.addEventListener("input",()=>{
result.innerHTML=text.value.toUpperCase()
       })
           
        
    </script>
</body>
</html>
