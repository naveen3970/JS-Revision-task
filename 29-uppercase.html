<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Uppercase</title>
    <style>
          body {
    background-color: rgb(73, 192, 192);
   
  }
    #form {
    background-color: white;
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: justify;

  }
  #result{
    font-weight: bold;
    font-size: larger;
    padding-top: 20px;
    color: #c74d1d;
  }
 

    label {
            font-size: x-large;
        }

        input {
            padding: 17px;
            font-size: large;
            border-radius: 15px;
            width: 50%;
        }
      
   
    </style>
</head>
<body>

      <div id="form">
        <label for="input">Enter the value:</label>
        <input type="text" id="value" >
        <div id="result"></div>
    </div>
    <script>
        const text=document.getElementById("value")
        const result=document.getElementById("result")
       text.addEventListener("input",()=>{
result.innerHTML=text.value.toUpperCase()
       })
           
        
    </script>
</body>
</html>
