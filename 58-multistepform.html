<!DOCTYPE html>
<html>

<head>
<title>Multi Step Form</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.step{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:350px;
animation:fade 0.4s ease;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
font-size:14px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
transition:.3s;
}

input:focus,textarea:focus{
border-color:#4facfe;
outline:none;
box-shadow:0 0 5px rgba(79,172,254,0.5);
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
margin-right:10px;
transition:.3s;
}

#nextbutton{
background:#4facfe;
color:white;
}

#nextbutton:hover{
background:#2f80ed;
}

#prebutton{
background:#ccc;
}

#prebutton:hover{
background:#999;
}

textarea{
height:70px;
resize:none;
}



</style>

</head>

<body>

<div class="step">
<h2>User Details</h2>

<label>Enter the name</label>
<input type="text" id="name">

<label>Contact No</label>
<input type="text" id="phone">

<button onclick="next()" id="nextbutton">Next</button>

</div>

<div class="step">

<h2>Email details</h2>

<label>Enter the Email</label>
<input type="email" id="email">

<label>Enter the password</label>
<input type="password" id="pass">

<button onclick="prev()" id="prebutton">Prev</button>
<button onclick="next()" id="nextbutton">Next</button>

</div>

<div class="step">

<h2>Address</h2>

<label>Enter the Address</label>
<textarea id="Address"></textarea>

<label>City</label>
<input type="text" id="city">

<label>Pincode</label>
<input type="text" id="zipcode">

<button onclick="prev()" id="prebutton">Prev</button>
<button onclick="result()" id="nextbutton">Submit</button>

</div>

<script>

let step = 0;
let steps = document.querySelectorAll(".step");

function showStep(){

steps.forEach((s,i)=>
s.style.display = i===step ? "block":"none"
);

}

function next(){

if(step < steps.length-1){
step++;
showStep();
}

}

function prev(){

if(step>0){
step--;
showStep();
}

}

function result(){

alert("Form submitted successfully");

step=0;

showStep();

}

showStep();

</script>

</body>

</html>
