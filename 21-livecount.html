<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live character count</title>
    <style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(159, 218, 148);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }


  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
    textarea{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 70%;
  }
  #output{
    font-weight: bold;
    font-size: large;
  }
  </style>
</head>

<body>
    <form class="form">
        <h1>Count of the characters </h1>
            <div class="formInput">
        <label for="text">Description</label>
    </div>
    <div class="formInput">
        <textarea name="text" id="input"></textarea>

    </div>
    <div id="output" class="formInput"> </div>
    </form>

</body>
<script>
    const input = document.getElementById("input")
    const error = document.getElementById("error")
    const output = document.getElementById("output")
    input.addEventListener("input", (e) => {
        let totalcount = 50
        let count = e.target.value.length
        if (totalcount <= count) {
            output.innerHTML="the limit is exist"

        }
        else {
            output.innerHTML="count"+count
        }



    })
</script>

</html>
