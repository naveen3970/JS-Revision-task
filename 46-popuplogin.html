<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Modal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    padding-top: 100px;
}

#button {
    padding: 12px 20px;
    background: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}
#modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);

        display: flex;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    position: relative;
    animation: fadeIn 0.3s ease;
}
.close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 22px;
    cursor: pointer;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #5b86e5;
    color: rgb(13, 10, 10);
    font-weight: bold;
}
#button {
    padding: 10px;
    margin-top: 10px;
    width: 10%;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #5b86e5;
    color: rgb(13, 10, 10);
    font-weight: bold;
}

.cancelbtn {
    background: #e74c3c;
}
#result {
    margin-top: 20px;
    color: white;
    font-weight: bold;
}


</style>
</head>

<body>

<button id="button" onclick="openModal()">Go to login page</button>

<div id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <label><b>Email</b></label>
        <input type="email" id="Email" required>

        <label><b>Password</b></label>
        <input type="password" id="pass" required>

        <button onclick="data()">Login</button>
        <button class="cancelbtn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="result"></div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
   

}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function data() {
    const email = document.getElementById("Email").value;
    const password = document.getElementById("pass").value;

    document.getElementById("modal").style.display = "none";
    document.getElementById("button").style.display = "none";

    document.getElementById("result").innerHTML =
        `Logged in as: ${email}`;
}
window.onclick = function (e) {
    let modal = document.getElementById("modal");
    if (e.target === modal) {
        closeModal();
    }
};
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        closeModal();
    }
});
</script>

</body>
</html>
