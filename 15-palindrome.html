<!-- 15. Palindrome Checker -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String
</title>
<style>
    body {
    background-color: rgb(223, 241, 241);
  }

  .form {
    background-color: rgb(190, 166, 190);
    text-align: center;
    padding: 60px;
    max-width: 500px;
    margin: 9rem auto;
    border-radius: 15px;
   text-align: center;
  }
    #errorCheck {
    color: red;
    font-size: larger;
    text-align: center;
   
  }
    #button {
    padding: 17px;
    font-weight: bold;
    font-size: large;
    border-radius: 15px;
    background-color: rgb(252, 252, 252);
    width: 55%;
  }

  .formInput{
    padding-top: 20px;
    text-align: center;
    
  }
  label{
    font-size: x-large;
  }
    input{
    padding: 17px;
    font-size: large;
    border-radius: 15px; 
    width: 50%;
  }
  #result{
    font-weight: bold;
    font-size: large;
  }

</style>
</head>
<body>
    <body>
    <form class="form">
        <h1>Palindrome Checker</h1>
        <div class="formInput">
            <label for=""> Enter the string:</label>
        </div>
        <div class="formInput">
            <input type="text" id="input">

        </div>
        <div id="errorCheck"></div>
        <div class="formInput">

            <button type="button" id="button">Check palindrome </button>
        </div>
        <div id="result"></div>
    </form>
    <script>
    const input=document.getElementById("input")
    const error=document.getElementById("errorCheck")
    const button=document.getElementById("button")
    const result=document.getElementById("result")
    isValid=true
function validation(){
    if(input.value==="" ){
    error.innerHTML="Enter the string "
    isValid=false
    return isValid
}
else if(input.value.includes(" ")){
    error.innerHTML="Enter only one string "
    isValid=false
    return isValid
}
else{
   
    error.innerHTML=""
    isValid=true
     return isValid
}
}
button.addEventListener("click",(e)=>{
   e.preventDefault()
    if(validation()){
        let text=input.value
let regex=/^[a-zA-Z]*$/
if(regex.test(text)){
        let string=""
for (let i = 0; i < text.length; i++) {
string=text.charAt(i)+ string
    
}
if (text===string) {
    result.innerHTML=`the string ${text} is palindrome`
} else {
    result.innerHTML=`the string ${text} is not palindrome`
}


    }
else{
    error.innerHTML="Enter only string"
}}
   
})
</script>
</body>
</body>
</html>
