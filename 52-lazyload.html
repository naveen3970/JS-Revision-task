<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lazy loading</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    gap: 25px;
}

img {
    width: 220px;
    height: 280px;
    object-fit: cover;
    border-radius: 15px;


    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

</style>
</head>
<body>
    <img data-src="https://picsum.photos/200?1" class="lazy">
<img data-src="https://picsum.photos/200?2" class="lazy">
<img data-src="https://picsum.photos/200?3" class="lazy">
<img data-src="https://picsum.photos/200?4" class="lazy">
<img data-src="https://picsum.photos/200?5" class="lazy">
    <script>
let imgs = document.querySelectorAll(".lazy");
 
let observer = new IntersectionObserver((entries,o)=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            let img = entry.target;
            img.src = img.dataset.src;
        }
    });
},{ threshold:0.2 });
 
imgs.forEach(img=>observer.observe(img));
</script>
</body>
</html>
