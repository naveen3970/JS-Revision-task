<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #ele {
        display: flex;
        gap: 40px;
    }

    .container {
        width: 260px;
        min-height: 350px;
        border-radius: 15px;
        padding: 15px;
        background: rgba(178, 72, 72, 0.2);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
    }

    .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .label {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.3);
    }

    p {
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        cursor: grab;
        transition: 0.3s;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
    }

    p:hover {
        background: #f1f1f1;
        transform: scale(1.05);
    }

    p:active {
        cursor: grabbing;
        background: #dff9fb;
    }
    .container.drag-over {
        border: 2px dashed #fff;
        background: rgba(255, 255, 255, 0.35);
    }
</style>
</head>

<body>
    <div id="ele">
        <div class="container" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="label">

                <label for="text">Available items</label>
            </div>
            <p draggable="true" ondragstart="drag(event)" id="item1">Item 1</p>
            <p draggable="true" ondragstart="drag(event)" id="item2">Item 2</p>
            <p draggable="true" ondragstart="drag(event)" id="item3">Item 3</p>
            <p draggable="true" ondragstart="drag(event)" id="item4">Item 4</p>
        </div>

        <div class="container" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div class="label">
                <label for="text">selected items</label>

            </div>
        </div>
    </div>


    <script>
        function allowDrop(e) { e.preventDefault(); }

        function drag(e) {
            e.dataTransfer.setData("text", e.target.id);
        }

        function drop(e) {
            e.preventDefault();
            let data = e.dataTransfer.getData("text");

            let target = e.target;

            // Ensure we drop only inside container
            while (!target.classList.contains("container")) {
                target = target.parentElement;
            }

            target.appendChild(document.getElementById(data));
        }
    </script>
</body>

</html>
